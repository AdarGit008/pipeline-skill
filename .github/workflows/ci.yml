name: ci
on: [push, pull_request]
permissions: read-all
# The standard only bites if CI runs it on every PR (ARCHITECTURE §9 — the self-gating
# meta-rule). This is the skill's OWN repo, so the pipeline job additionally runs
# `--self-check`: a malformed rule set can't merge. No GH_TOKEN is exported to the steps, so
# the forge-reading rules degrade to labeled SKIPs (offline honesty, §1.3 / AC #3) — the
# tree/history/ledger rules still score fully.
jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # history-plane rules (BR-05 stale-branches, HOT-02 back-merge, BR-06 release-marks) read local git history
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - name: rule-set integrity (--self-check — a malformed rule set can't merge)
        run: node check.mjs --self-check
      - name: unit tests (node --test — engine, config, evaluators, ledger, self-check, CLIs)
        run: node --test
      - name: self-score (the standard checks its own repo — exit 1 on any blocker)
        run: node check.mjs --repo .
